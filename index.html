<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTB Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
  <div class="header-brand">
    <img src="logo.jpg" alt="MTB Tracker" class="header-logo">
    <span class="header-title">MTB TRACKER</span>
  </div>
  <nav class="nav">
    <a href="index.html">Sorties</a>
    <a href="suspension.html">Suspension</a>
    <a href="entretien.html">Entretien</a>
    <a href="profil.html">Profil</a>
    <a href="accueil.html">Accueil</a>
  </nav>
</header>

  <main class="container">

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-val" id="statNb">0</span>
        <span class="stat-label">sorties</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="statDeniv">0 m</span>
        <span class="stat-label">dénivelé cumulé</span>
      </div>
      <div class="stat-item">
        <span class="stat-val" id="statDerniere">—</span>
        <span class="stat-label">dernière sortie</span>
      </div>
    </div>

    <div class="grid-layout">
      <div class="grid-col">
        <div class="form-card">
          <h2>Nouvelle sortie</h2>
          <div class="form-group">
            <label>Lieu / Bike park</label>
            <input id="rideInput" type="text" placeholder="ex: Métabief">
          </div>
          <div class="form-group">
            <label>Date</label>
            <input id="rideDate" type="date">
          </div>
          <div class="form-group">
            <label>Type de sortie</label>
            <select id="rideType">
              <option value="DH">DH / Bike park</option>
              <option value="Enduro">Enduro</option>
              <option value="Compétition">Compétition</option>
              <option value="XC">XC</option>
              <option value="Training">Training</option>
            </select>
          </div>
          <div class="form-group">
            <label>Dénivelé (m)</label>
            <input id="rideDeniv" type="number" placeholder="ex: 800">
          </div>
          <div class="form-group">
            <label>Notes</label>
            <input id="rideNotes" type="text" placeholder="Conditions, sensations...">
          </div>
          <button onclick="addRide()">Ajouter la sortie</button>
        </div>
      </div>

      <div class="grid-col">
        <ul id="rideList"></ul>
      </div>
    </div>

  </main>

 <footer class="footer">
  <p>Made for riders ⛰️</p>
  <div class="footer-brand">
    <img src="logo.jpg" alt="MTB Tracker">
    <span>MTB TRACKER</span>
  </div>
</footer

  <script type="module" src="script.js"></script>
</body>
</html>
