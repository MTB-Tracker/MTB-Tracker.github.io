<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTT Tracker — Profil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>VTT Tracker 🚵</h1>
    <nav class="nav">
      <a href="index.html">Sorties</a>
      <a href="suspension.html">Suspension</a>
      <a href="entretien.html">Entretien</a>
      <a href="profil.html" class="active">Profil</a>
    </nav>
  </header>

  <main class="container">
    <div class="grid-layout">

      <div class="grid-col">
        <div class="form-card">
          <h2>Mon profil</h2>
          <div class="form-group">
            <label for="profilNom">Nom / Pseudo</label>
            <input id="profilNom" type="text" placeholder="ex: ChadYOYO">
          </div>
          <div class="form-group">
            <label for="profilAge">Âge</label>
            <input id="profilAge" type="number" placeholder="ex: 15">
          </div>
          <div class="form-group">
            <label for="profilPoids">Poids avec équipement (kg)</label>
            <input id="profilPoids" type="number" placeholder="ex: 62">
          </div>
          <div class="form-group">
            <label for="profilCategorie">Catégorie compétition</label>
            <select id="profilCategorie">
              <option>U17</option>
              <option>U19</option>
              <option>Junior</option>
              <option>Espoir</option>
              <option>Élite</option>
              <option>Master</option>
              <option>Aucune</option>
            </select>
          </div>
          <div class="form-group">
            <label for="profilClub">Club</label>
            <input id="profilClub" type="text" placeholder="ex: VTT Club Montceau">
          </div>
          <button onclick="sauvegarderProfil()">Sauvegarder</button>
        </div>

        <div class="form-card">
          <h2>Mon vélo</h2>
          <div class="form-group">
            <label for="veloMarque">Marque / Modèle</label>
            <input id="veloMarque" type="text" placeholder="ex: Giant Reign 2022">
          </div>
          <div class="form-group">
            <label for="veloTaille">Taille cadre</label>
            <select id="veloTaille">
              <option>XS</option>
              <option>S</option>
              <option selected>M</option>
              <option>L</option>
              <option>XL</option>
            </select>
          </div>
          <div class="form-group">
            <label for="veloRoues">Taille roues</label>
            <select id="veloRoues">
              <option>27.5"</option>
              <option>29"</option>
              <option>27.5" / 29" (mullet)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="veloDebattement">Débattement (mm)</label>
            <input id="veloDebattement" type="number" placeholder="ex: 170">
          </div>
          <div class="form-group">
            <label for="veloNotes">Specs / Upgrades</label>
            <textarea id="veloNotes" rows="3" placeholder="ex: Fourche Zeb, freins Magura MT5..."></textarea>
          </div>
          <button onclick="sauvegarderVelo()">Sauvegarder</button>
        </div>
      </div>

      <div class="grid-col">
        <div class="form-card">
          <h2>Mes compétitions</h2>
          <div class="form-group">
            <label for="compNom">Nom de la compétition</label>
            <input id="compNom" type="text" placeholder="ex: TRJV Autun DH">
          </div>
          <div class="form-group">
            <label for="compDate">Date</label>
            <input id="compDate" type="date">
          </div>
          <div class="form-group">
            <label for="compClassement">Classement</label>
            <input id="compClassement" type="text" placeholder="ex: 22e / 45">
          </div>
          <div class="form-group">
            <label for="compNotes">Notes</label>
            <input id="compNotes" type="text" placeholder="Conditions, ressenti...">
          </div>
          <button onclick="ajouterComp()">Ajouter</button>
          <ul id="compList" style="margin-top:16px;padding:0;list-style:none"></ul>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>Made for riders ⛰️</p>
  </footer>

 <script type="module" src="profil.js"></script>
</body>
</html>
