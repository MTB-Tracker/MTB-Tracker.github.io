<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTB Tracker — Profil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <div></div>
  <div class="header-brand">
    <img src="logo.png" alt="MTB Tracker" class="header-logo">
    <span class="header-title">MTB TRACKER</span>
  </div>
  <nav class="nav">
    <a href="index.html">Sorties</a>
    <a href="suspension.html">Suspension</a>
    <a href="entretien.html">Entretien</a>
    <a href="profil.html">Profil</a>
    <a href="accueil.html">Accueil</a>
  </nav>
</header>

  <main class="container">
    <div class="grid-layout">

      <div class="grid-col">
        <div class="form-card">
          <h2>Mon profil</h2>
          <div class="form-group">
            <label>Nom / Pseudo</label>
            <input id="profilNom" type="text" placeholder="ex: ChadYOYO">
          </div>
          <div class="form-group">
            <label>Âge</label>
            <input id="profilAge" type="number" placeholder="ex: 15">
          </div>
          <div class="form-group">
            <label>Poids avec équipement (kg)</label>
            <input id="profilPoids" type="number" placeholder="ex: 62">
          </div>
          <div class="form-group">
            <label>Catégorie compétition</label>
            <select id="profilCategorie">
              <option>U17</option>
              <option>U19</option>
              <option>Junior</option>
              <option>Espoir</option>
              <option>Élite</option>
              <option>Master</option>
              <option>Aucune</option>
            </select>
          </div>
          <div class="form-group">
            <label>Club</label>
            <input id="profilClub" type="text" placeholder="ex: MTB Club Montceau">
          </div>
          <button onclick="sauvegarderProfil()">Sauvegarder</button>
        </div>

        <div class="form-card">
          <h2>Mon vélo</h2>
          <div class="form-group">
            <label>Marque / Modèle</label>
            <input id="veloMarque" type="text" placeholder="ex: Giant Reign 2022">
          </div>
          <div class="form-group">
            <label>Taille cadre</label>
            <select id="veloTaille">
              <option>XS</option>
              <option>S</option>
              <option selected>M</option>
              <option>L</option>
              <option>XL</option>
            </select>
          </div>
          <div class="form-group">
            <label>Taille roues</label>
            <select id="veloRoues">
              <option>27.5"</option>
              <option>29"</option>
              <option>27.5" / 29" (mullet)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Débattement (mm)</label>
            <input id="veloDebattement" type="number" placeholder="ex: 170">
          </div>
          <div class="form-group">
            <label>Specs / Upgrades</label>
            <textarea id="veloNotes" rows="3" placeholder="ex: Fourche Zeb, freins Magura MT5..."></textarea>
          </div>
          <button onclick="sauvegarderVelo()">Sauvegarder</button>
        </div>
      </div>

      <div class="grid-col">
        <div class="form-card">
          <h2>Mes compétitions</h2>
          <div class="form-group">
            <label>Nom de la compétition</label>
            <input id="compNom" type="text" placeholder="ex: TRJV Autun DH">
          </div>
          <div class="form-group">
            <label>Date</label>
            <input id="compDate" type="date">
          </div>
          <div class="form-group">
            <label>Classement</label>
            <input id="compClassement" type="text" placeholder="ex: 22e / 45">
          </div>
          <div class="form-group">
            <label>Notes</label>
            <input id="compNotes" type="text" placeholder="Conditions, ressenti...">
          </div>
          <button onclick="ajouterComp()">Ajouter</button>
          <ul id="compList" style="margin-top:16px;padding:0;list-style:none"></ul>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
  <p>Made for riders ⛰️</p>
  <div class="footer-brand">
    <img src="logo.jpg" alt="MTB Tracker">
    <span>MTB TRACKER</span>
  </div>
</footer

  <script type="module" src="profil.js"></script>
</body>
</html>
